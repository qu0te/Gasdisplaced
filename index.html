<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Displaced Fuel Calculator</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

  <h1>Annual Displaced Fuel Calculator</h1>

  <div class="controls">

    <label>
      Fuel Consumption (L/100km): 
      <input type="range" id="fuelSlider" min="3" max="15" step="0.1" value="6">
      <span id="fuelValue">6</span> L/100km
    </label>

    <label>
      Km driven per EV per year:
      <input type="range" id="kmSlider" min="0" max="50000" step="500" value="13500">
      <span id="kmValue">13500</span> km/year
    </label>
    <label>
  Fuel Price (€/liter):
  <input type="range" id="priceSlider" min="1" max="3" step="0.05" value="1.80">
  <span id="priceValue">1.80</span> €/L
</label>
    <button id="resetBtn">Reset to Defaults</button>
  </div>
  
<h2>Cumulative Impact</h2>

<div>
  <strong>Total Fuel Displaced:</strong>
  <span id="totalFuel">0</span> liters
</div>

<div>
  <strong>Total CO₂ Avoided:</strong>
  <span id="totalCO2">0</span> kg
</div>

<div>
  <strong>Total Cash Displaced:</strong>
  €<span id="totalCash">0</span>
</div>
  <canvas id="chart"></canvas>

  <h2>Monthly Cash Displaced</h2>
<canvas id="cashChart"></canvas>

  <script src="script.js"></script>

</body>
</html>
